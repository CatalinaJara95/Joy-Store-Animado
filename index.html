<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="https://kit.fontawesome.com/bde7a8ea6f.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Bitcount+Grid+Single+Ink:wght@100..900&family=Bitcount+Prop+Single+Ink:wght@100..900&family=Cause:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Unica+One&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="layout">
        <nav class="navbar">
            <div class="menu">
                <div class="titulo">
                    <i class="fa-solid fa-lg fa-gamepad"></i>
                    <h2>Joy-Store</h2>
                </div>
                <div class="icono-menu">
                <i class="icono-menu fa-solid fa-xl fa-bars"></i>
                </div>
            </div>
            <div class="categorias">
            <a href="Inicio">Inicio</a>
            <a href="Catálogo">Catálogo</a>
            <a href="Ofertas">Ofertas</a>
            <a href="Contacto">Contacto</a>
            </div>
        </nav>
        <aside class="filtros">
            <label for="order">Ordernar por</label>
            <select name="order" id="order">
                <option value="">Precio</option>
                <option value="">Mas vendidos</option>
                <option value="">Nombre</option>
            </select>
        </aside>
        <main class="productos">
            <article class="card">
                <img class="card-img" src="https://i.pinimg.com/1200x/fc/95/b1/fc95b191315e4e24c0c26af335bb9864.jpg"
                    alt="Minecraft">
                <p class="car-info">Minecraft</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="https://i.pinimg.com/1200x/ad/65/27/ad652735b52c10fa06a585c78d5db749.jpg"
                    alt="MarioKart">
                <p class="car-info">MarioKart</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="https://i.pinimg.com/736x/58/e8/7c/58e87c42888c5f5cae5f33a796578363.jpg"
                    alt="Celeste">
                <p class="car-info">Celeste</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="https://i.pinimg.com/736x/33/14/c9/3314c992a1da0effd20293ee44093467.jpg"
                    alt="Celeste">
                <p class="car-info">Animal Crossing</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="https://i.pinimg.com/736x/4a/c1/dc/4ac1dc97cc8835bf24c9233a3e6a30af.jpg"
                    alt="Celeste">
                <p class="car-info">Kirby</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="https://i.pinimg.com/736x/10/68/54/1068540dd6bad7ef390f469907a37cd9.jpg"
                    alt="Celeste">
                <p class="car-info">Little Kitty - Big City</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="https://i.pinimg.com/736x/57/22/60/5722602608042fae59e79dd56a0e4653.jpg"
                    alt="Celeste">
                <p class="car-info">Zelda - Breath of the Wild</p>
                <button class="card-button">Ver más</button>
            </article>
            <article class="card">
                <img class="card-img" src="https://i.pinimg.com/736x/47/05/fc/4705fcfa883c930a97636bee8987577f.jpg"
                    alt="Celeste">
                <p class="car-info">Donkey Kong - Tropical Freeze</p>
                <button class="card-button">Ver más</button>
            </article>
        </main>
        <div class="paginador">
            <div class="pagination">
                <a href="#">
                    << </a>
                        <a href="#">1</a>
                        <a href="#">2</a>
                        <a href="#">3</a>
                        <a href="#">>></a>
            </div>

        </div>
        <footer class="footer">
            <div>
                <i class="fa-brands fa-lg fa-facebook"></i>
                <i class="fa-brands fa-lg fa-instagram"></i>
            </div>
            <p>Todos los derechos reservados</p>
        </footer>
    </div>
</body>

</html>
